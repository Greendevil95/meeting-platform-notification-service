server:
  port: 8083

spring:
  application:
    name: notification-service
  datasource:
    hikari:
      maximum-pool-size: 10
    url: jdbc:postgresql://localhost:5433/notificationdb
    username: admin
    password: admin
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    hibernate:
      ddl-auto: validate
    open-in-view: false
logging:
  level:
   org.hibernate.SQL: OFF
   org.hibernate.orm.jdbc.bind: OFF

notification:
  kafka:
    retry:
      max-retries: 3
      initial-interval: 1s
      multiplier: 2.0
      max-interval: 10s
    prefixes:
      user-service-prefix: user-service
      meeting-service-prefix: meeting-service
    topics:
      user-created: ${notification.kafka.prefixes.user-service-prefix}.user-created
      user-updated: ${notification.kafka.prefixes.user-service-prefix}.user-updated
      user-deleted: ${notification.kafka.prefixes.user-service-prefix}.user-deleted
      user-status-changed: ${notification.kafka.prefixes.user-service-prefix}.user-status-changed
      meeting-created: ${notification.kafka.prefixes.meeting-service-prefix}.meeting-created
      meeting-updated: ${notification.kafka.prefixes.meeting-service-prefix}.meeting-updated
      meeting-cancelled: ${notification.kafka.prefixes.meeting-service-prefix}.meeting-cancelled
      meeting-participant-added: ${notification.kafka.prefixes.meeting-service-prefix}.meeting-participant-added
      meeting-participant-removed: ${notification.kafka.prefixes.meeting-service-prefix}.meeting-participant-removed
